name: MinIO Integration Test
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  minio-test:
    name: MinIO S3 secret integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11.1
        with:
          vcpkgGitCommitId: ce613c41372b23b1f51333815feb3edd87ef8a8b

      - name: Build
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: 12
          VCPKG_TOOLCHAIN_PATH: ${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
        run: make reldebug

      - name: Start MinIO
        run: make minio-up

      - name: Test MinIO S3 secrets
        env:
          OPENDALFS_MINIO_AVAILABLE: 1
        run: ./build/reldebug/test/unittest test/sql/opendal_s3_minio.test

      - name: Stop MinIO
        if: always()
        run: make minio-down
